<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | UHP — UMKM Health Predictor</title>
  <meta name="description" content="Login ke dashboard UMKM Health Predictor untuk memantau kesehatan bisnis Anda." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/shared.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-bg"></div>
    <div class="login-bg-grid"></div>

    <div class="login-card">
      <div class="login-brand">
        <div class="login-brand-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
          </svg>
        </div>
        <div class="login-brand-text">
          <span class="login-brand-name">UHP</span>
          <span class="login-brand-sub">UMKM Health Predictor</span>
        </div>
      </div>

      <h1 class="login-title">Selamat Datang</h1>
      <p class="login-subtitle">Masuk ke dashboard untuk memantau bisnis Anda</p>

      <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
        <div class="login-field">
          <label class="login-label" for="loginEmail">Email</label>
          <input type="email" class="login-input" id="loginEmail" placeholder="contoh: andi@uhp.id" required autocomplete="email" />
        </div>

        <div class="login-field">
          <label class="login-label" for="loginPassword">Password</label>
          <input type="password" class="login-input" id="loginPassword" placeholder="Masukkan password" required autocomplete="current-password" />
        </div>

        <div class="login-error" id="loginError"></div>

        <button type="submit" class="login-btn" id="loginBtn">
          <span>Masuk</span>
          <div class="btn-loader"><div class="login-spinner"></div></div>
        </button>
      </form>

      <div class="login-footer">
        <a href="index.html">← Kembali ke Beranda</a>
      </div>

      <div class="login-hint">
        <strong>Demo Account:</strong><br>
        Email: <strong>andi@uhp.id</strong> — Password: <strong>andi123</strong><br>
        Email: <strong>zaky@uhp.id</strong> — Password: <strong>zaky123</strong>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    redirectIfLoggedIn();

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('loginError');

      btn.classList.add('loading');
      errEl.classList.remove('show');

      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      // Small delay for UX
      await new Promise(r => setTimeout(r, 600));

      const result = await uhpLogin(email, password);

      if (result.success) {
        window.location.href = 'dashboard.html';
      } else {
        errEl.textContent = result.error;
        errEl.classList.add('show');
        btn.classList.remove('loading');
      }
    }
  </script>
</body>
</html>
